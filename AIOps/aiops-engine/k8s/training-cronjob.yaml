apiVersion: batch/v1
kind: CronJob
metadata:
  name: aiops-anomaly-training
  namespace: techx-tf3
spec:
  # Chạy vào 2h sáng Thứ Hai hàng tuần (giờ Việt Nam tương đương 19:00 Chủ Nhật UTC)
  schedule: "0 19 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          priorityClassName: low-priority
          containers:
          - name: trainer
            image: 197826770971.dkr.ecr.ap-southeast-1.amazonaws.com/tf-2-ai-engine:IF-v27
            imagePullPolicy: Always




            command: ["python", "train_anomaly_model_eks.py"]
            securityContext:
              allowPrivilegeEscalation: false
              runAsNonRoot: true
              runAsUser: 1000
              capabilities:
                drop:
                - ALL
            resources:
              requests:
                cpu: "500m"
                memory: "512Mi"
              limits:
                cpu: "1000m"
                memory: "1Gi"
            env:
            - name: PROMETHEUS_URL
              value: "http://prometheus.techx-tf3.svc.cluster.local:9090"
            - name: AIOPS_S3_BUCKET
              value: "tf3-aiops-models-197826770971"
            - name: AWS_REGION
              value: "ap-southeast-1"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aiops-engine-secrets
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aiops-engine-secrets
                  key: aws-secret-access-key
          restartPolicy: OnFailure

