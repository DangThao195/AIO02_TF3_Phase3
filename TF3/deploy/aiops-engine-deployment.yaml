apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-engine
  namespace: techx-tf3
  labels:
    app: aiops-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-engine
  template:
    metadata:
      labels:
        app: aiops-engine
    spec:
      containers:
      - name: engine
        image: 197826770971.dkr.ecr.us-east-1.amazonaws.com/tf-2-ai-engine:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: AIOPS_SIMULATION_MODE
          value: "false"
        
        # Telemetry Endpoints trỏ đến internal DNS của cluster techx-tf3
        - name: PROMETHEUS_URL
          value: "http://prometheus.techx-tf3.svc.cluster.local:9090"
        - name: JAEGER_URL
          value: "http://jaeger.techx-tf3.svc.cluster.local:16686"
        - name: OPENSEARCH_URL
          value: "http://opensearch.techx-tf3.svc.cluster.local:9200"
        
        # Bedrock LLM config cho N. Virginia (us-east-1)
        - name: AWS_DEFAULT_REGION
          value: "us-east-1"
        - name: AWS_BEDROCK_REGION
          value: "us-east-1"
        - name: BEDROCK_MODEL_ID
          value: "amazon.nova-lite-v1:0"
        - name: BEDROCK_KB_ID
          value: "GH3FUCYVOJ"
        
        # AWS credentials trích xuất từ K8s Secrets để bảo mật
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aiops-engine-secrets
              key: aws-access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aiops-engine-secrets
              key: aws-secret-access-key
        
        # Slack app config lấy từ K8s Secrets
        - name: SLACK_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: aiops-engine-secrets
              key: slack-bot-token
        - name: SLACK_SIGNING_SECRET
          valueFrom:
            secretKeyRef:
              name: aiops-engine-secrets
              key: slack-signing-secret
        - name: SLACK_CHANNEL_ID
          valueFrom:
            secretKeyRef:
              name: aiops-engine-secrets
              key: slack-channel-id

        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-engine
  namespace: techx-tf3
spec:
  selector:
    app: aiops-engine
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP
