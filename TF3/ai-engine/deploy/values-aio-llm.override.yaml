# AI real-LLM override (AI-8..12). Ghép thêm bằng -f khi deploy — KHÔNG sửa file mẫu
# deploy/values-aio-llm.yaml của BTC. Đây là override riêng của TF3.
#
#   helm upgrade ... -f deploy/values-aio-llm.yaml -f TF3/ai-engine/deploy/values-aio-llm.override.yaml
#
# Bật LLM thật (gpt-4o-mini) thay mock cho product-reviews. Interface không đổi (OpenAI-compatible),
# chỉ đổi env — xem C4 §INPUT.1. Secret qua K8s Secret `llm-api-key` (AI-8), không hardcode.
# QUYẾT ĐỊNH NÀY CẦN ADR + trần ngân sách CDO duyệt trước khi bật (C5) — mock = $0, thật = tốn tiền.

components:
  product-reviews:
    env:
      # Trỏ sang OpenAI thật thay vì mock llm service.
      - name: LLM_BASE_URL
        value: "https://api.openai.com/v1"
      - name: LLM_MODEL
        value: "gpt-4o-mini"
      - name: OPENAI_API_KEY
        valueFrom:
          secretKeyRef:
            name: llm-api-key       # kubectl create secret generic llm-api-key --from-literal=key=<REAL_KEY>
            key: key
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 500m, memory: 256Mi }

# Egress: chỉ mở HTTPS tới api.openai.com, chặn còn lại (C4 §Security). CDO Security cấu hình
# NetworkPolicy tương ứng — ghi rõ ở đây để hai bên đồng bộ.
#   allow: egress TCP 443 -> api.openai.com
#   deny:  mọi egress khác từ pod product-reviews
