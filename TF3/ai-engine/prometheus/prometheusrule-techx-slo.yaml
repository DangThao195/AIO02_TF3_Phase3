# PrometheusRule CRD — bản gộp recording_rules.yaml + burnrate_alerts.yaml (AUTO-GEN, đừng sửa tay).
# Regenerate: chạy lại script trong git history hoặc gộp 2 file nguồn. Chuẩn MWMB 4 cặp (sloth/pyrra).
# CDO: đổi label `release:` cho khớp ruleSelector của Prometheus rồi `kubectl apply -f`.
# Xem HANDOFF-CDO-recording-rules.md.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: techx-slo-rules
  namespace: techx-tf3
  labels:
    release: prometheus
    app.kubernetes.io/part-of: techx-aiops
spec:
  groups:
  - name: techx_sli
    interval: 30s
    rules:
    - record: sli:checkout_error:ratio_rate5m
      expr: sum(rate(traces_span_metrics_calls_total{service_name="checkout",status_code="STATUS_CODE_ERROR"}[5m])) / clamp_min(sum(rate(traces_span_metrics_calls_total{service_name="checkout"}[5m])), 1e-9)
    - record: sli:checkout_error:ratio_rate30m
      expr: sum(rate(traces_span_metrics_calls_total{service_name="checkout",status_code="STATUS_CODE_ERROR"}[30m])) / clamp_min(sum(rate(traces_span_metrics_calls_total{service_name="checkout"}[30m])),
        1e-9)
    - record: sli:checkout_error:ratio_rate1h
      expr: sum(rate(traces_span_metrics_calls_total{service_name="checkout",status_code="STATUS_CODE_ERROR"}[1h])) / clamp_min(sum(rate(traces_span_metrics_calls_total{service_name="checkout"}[1h])), 1e-9)
    - record: sli:checkout_error:ratio_rate2h
      expr: sum(rate(traces_span_metrics_calls_total{service_name="checkout",status_code="STATUS_CODE_ERROR"}[2h])) / clamp_min(sum(rate(traces_span_metrics_calls_total{service_name="checkout"}[2h])), 1e-9)
    - record: sli:checkout_error:ratio_rate6h
      expr: sum(rate(traces_span_metrics_calls_total{service_name="checkout",status_code="STATUS_CODE_ERROR"}[6h])) / clamp_min(sum(rate(traces_span_metrics_calls_total{service_name="checkout"}[6h])), 1e-9)
    - record: sli:checkout_error:ratio_rate1d
      expr: sum(rate(traces_span_metrics_calls_total{service_name="checkout",status_code="STATUS_CODE_ERROR"}[1d])) / clamp_min(sum(rate(traces_span_metrics_calls_total{service_name="checkout"}[1d])), 1e-9)
    - record: sli:checkout_error:ratio_rate3d
      expr: sum(rate(traces_span_metrics_calls_total{service_name="checkout",status_code="STATUS_CODE_ERROR"}[3d])) / clamp_min(sum(rate(traces_span_metrics_calls_total{service_name="checkout"}[3d])), 1e-9)
    - record: sli:frontend_error:ratio_rate5m
      expr: sum(rate(traces_span_metrics_calls_total{service_name="frontend",status_code="STATUS_CODE_ERROR"}[5m])) / clamp_min(sum(rate(traces_span_metrics_calls_total{service_name="frontend"}[5m])), 1e-9)
    - record: sli:frontend_error:ratio_rate30m
      expr: sum(rate(traces_span_metrics_calls_total{service_name="frontend",status_code="STATUS_CODE_ERROR"}[30m])) / clamp_min(sum(rate(traces_span_metrics_calls_total{service_name="frontend"}[30m])),
        1e-9)
    - record: sli:frontend_error:ratio_rate1h
      expr: sum(rate(traces_span_metrics_calls_total{service_name="frontend",status_code="STATUS_CODE_ERROR"}[1h])) / clamp_min(sum(rate(traces_span_metrics_calls_total{service_name="frontend"}[1h])), 1e-9)
    - record: sli:frontend_error:ratio_rate2h
      expr: sum(rate(traces_span_metrics_calls_total{service_name="frontend",status_code="STATUS_CODE_ERROR"}[2h])) / clamp_min(sum(rate(traces_span_metrics_calls_total{service_name="frontend"}[2h])), 1e-9)
    - record: sli:frontend_error:ratio_rate6h
      expr: sum(rate(traces_span_metrics_calls_total{service_name="frontend",status_code="STATUS_CODE_ERROR"}[6h])) / clamp_min(sum(rate(traces_span_metrics_calls_total{service_name="frontend"}[6h])), 1e-9)
    - record: sli:frontend_error:ratio_rate1d
      expr: sum(rate(traces_span_metrics_calls_total{service_name="frontend",status_code="STATUS_CODE_ERROR"}[1d])) / clamp_min(sum(rate(traces_span_metrics_calls_total{service_name="frontend"}[1d])), 1e-9)
    - record: sli:frontend_error:ratio_rate3d
      expr: sum(rate(traces_span_metrics_calls_total{service_name="frontend",status_code="STATUS_CODE_ERROR"}[3d])) / clamp_min(sum(rate(traces_span_metrics_calls_total{service_name="frontend"}[3d])), 1e-9)
    - record: sli:cart_error:ratio_rate5m
      expr: sum(rate(traces_span_metrics_calls_total{service_name="cart",status_code="STATUS_CODE_ERROR"}[5m])) / clamp_min(sum(rate(traces_span_metrics_calls_total{service_name="cart"}[5m])), 1e-9)
    - record: sli:cart_error:ratio_rate30m
      expr: sum(rate(traces_span_metrics_calls_total{service_name="cart",status_code="STATUS_CODE_ERROR"}[30m])) / clamp_min(sum(rate(traces_span_metrics_calls_total{service_name="cart"}[30m])), 1e-9)
    - record: sli:cart_error:ratio_rate1h
      expr: sum(rate(traces_span_metrics_calls_total{service_name="cart",status_code="STATUS_CODE_ERROR"}[1h])) / clamp_min(sum(rate(traces_span_metrics_calls_total{service_name="cart"}[1h])), 1e-9)
    - record: sli:cart_error:ratio_rate2h
      expr: sum(rate(traces_span_metrics_calls_total{service_name="cart",status_code="STATUS_CODE_ERROR"}[2h])) / clamp_min(sum(rate(traces_span_metrics_calls_total{service_name="cart"}[2h])), 1e-9)
    - record: sli:cart_error:ratio_rate6h
      expr: sum(rate(traces_span_metrics_calls_total{service_name="cart",status_code="STATUS_CODE_ERROR"}[6h])) / clamp_min(sum(rate(traces_span_metrics_calls_total{service_name="cart"}[6h])), 1e-9)
    - record: sli:cart_error:ratio_rate1d
      expr: sum(rate(traces_span_metrics_calls_total{service_name="cart",status_code="STATUS_CODE_ERROR"}[1d])) / clamp_min(sum(rate(traces_span_metrics_calls_total{service_name="cart"}[1d])), 1e-9)
    - record: sli:cart_error:ratio_rate3d
      expr: sum(rate(traces_span_metrics_calls_total{service_name="cart",status_code="STATUS_CODE_ERROR"}[3d])) / clamp_min(sum(rate(traces_span_metrics_calls_total{service_name="cart"}[3d])), 1e-9)
    - record: sli:frontend_latency:p95_5m
      expr: histogram_quantile(0.95, sum by (le) (rate(traces_span_metrics_duration_milliseconds_bucket{service_name="frontend"}[5m]))) / 1000
    - record: sli:frontend_latency:ratio_under1s_5m
      expr: sum(rate(traces_span_metrics_duration_milliseconds_bucket{service_name="frontend",le="1000"}[5m])) / clamp_min(sum(rate(traces_span_metrics_duration_milliseconds_count{service_name="frontend"}[5m])),
        1e-9)
    - record: sli:frontend_latency:ratio_under1s_1h
      expr: sum(rate(traces_span_metrics_duration_milliseconds_bucket{service_name="frontend",le="1000"}[1h])) / clamp_min(sum(rate(traces_span_metrics_duration_milliseconds_count{service_name="frontend"}[1h])),
        1e-9)
  - name: techx_slo
    interval: 30s
    rules:
    - record: slo:checkout:burn_rate_5m
      expr: sli:checkout_error:ratio_rate5m / 0.01
    - record: slo:checkout:burn_rate_30m
      expr: sli:checkout_error:ratio_rate30m / 0.01
    - record: slo:checkout:burn_rate_1h
      expr: sli:checkout_error:ratio_rate1h / 0.01
    - record: slo:checkout:burn_rate_2h
      expr: sli:checkout_error:ratio_rate2h / 0.01
    - record: slo:checkout:burn_rate_6h
      expr: sli:checkout_error:ratio_rate6h / 0.01
    - record: slo:checkout:burn_rate_1d
      expr: sli:checkout_error:ratio_rate1d / 0.01
    - record: slo:checkout:burn_rate_3d
      expr: sli:checkout_error:ratio_rate3d / 0.01
    - record: slo:frontend:burn_rate_1h
      expr: sli:frontend_error:ratio_rate1h / 0.005
    - record: slo:frontend:burn_rate_5m
      expr: sli:frontend_error:ratio_rate5m / 0.005
    - record: slo:cart:burn_rate_1h
      expr: sli:cart_error:ratio_rate1h / 0.005
    - record: slo:cart:burn_rate_5m
      expr: sli:cart_error:ratio_rate5m / 0.005
    - record: slo:checkout:error_budget_remaining
      expr: clamp_max(1 - (sli:checkout_error:ratio_rate1h / 0.01), 1)
    - record: slo:frontend:error_budget_remaining
      expr: clamp_max(1 - (sli:frontend_error:ratio_rate1h / 0.005), 1)
    - record: slo:cart:error_budget_remaining
      expr: clamp_max(1 - (sli:cart_error:ratio_rate1h / 0.005), 1)
  - name: techx_checkout_burnrate
    rules:
    - alert: CheckoutBurnRateCriticalFast
      expr: sli:checkout_error:ratio_rate1h > 0.144 and sli:checkout_error:ratio_rate5m > 0.144
      for: 2m
      labels:
        severity: critical
        service: checkout
        sli: checkout_success_ratio
        source_layer: slo-burnrate
        pair: 1-page-fast
      annotations:
        summary: Checkout burn 14.4x (1h+5m) — page NOW
        description: checkout error ratio {{ $value | humanizePercentage }} — revenue flow degraded.
        runbook: TF3/ai-engine/runbooks/RB-PAY-01.md
    - alert: CheckoutBurnRateCriticalSlow
      expr: sli:checkout_error:ratio_rate6h > 0.06 and sli:checkout_error:ratio_rate30m > 0.06
      for: 5m
      labels:
        severity: critical
        service: checkout
        sli: checkout_success_ratio
        source_layer: slo-burnrate
        pair: 2-page-slow
      annotations:
        summary: Checkout burn 6x (6h+30m) — page
        runbook: TF3/ai-engine/runbooks/RB-PAY-01.md
    - alert: CheckoutBurnRateWarningMedium
      expr: sli:checkout_error:ratio_rate1d > 0.03 and sli:checkout_error:ratio_rate2h > 0.03
      for: 15m
      labels:
        severity: warning
        service: checkout
        sli: checkout_success_ratio
        source_layer: slo-burnrate
        pair: 3-ticket-medium
      annotations:
        summary: Checkout burn 3x (1d+2h) — ticket, xử trong ngày
    - alert: CheckoutBurnRateWarningSlow
      expr: sli:checkout_error:ratio_rate3d > 0.01 and sli:checkout_error:ratio_rate6h > 0.01
      for: 1h
      labels:
        severity: warning
        service: checkout
        sli: checkout_success_ratio
        source_layer: slo-burnrate
        pair: 4-ticket-slow
      annotations:
        summary: Checkout burn 1x (3d+6h) — ticket, đưa Ops Review
  - name: techx_browse_cart_burnrate
    rules:
    - alert: BrowseBurnRateCritical
      expr: sli:frontend_error:ratio_rate1h > 0.072 and sli:frontend_error:ratio_rate5m > 0.072
      for: 2m
      labels:
        severity: critical
        service: frontend
        sli: browse_success_ratio
        source_layer: slo-burnrate
        pair: 1-page-fast
      annotations:
        summary: Browse burn 14.4x (1h+5m)
    - alert: CartBurnRateCritical
      expr: sli:cart_error:ratio_rate1h > 0.072 and sli:cart_error:ratio_rate5m > 0.072
      for: 2m
      labels:
        severity: critical
        service: cart
        sli: cart_success_ratio
        source_layer: slo-burnrate
        pair: 1-page-fast
      annotations:
        summary: Cart burn 14.4x (1h+5m)
  - name: techx_latency
    rules:
    - alert: StorefrontLatencySLOBreach
      expr: sli:frontend_latency:ratio_under1s_1h < 0.95
      for: 10m
      labels:
        severity: warning
        service: frontend
        sli: browse_latency
        source_layer: slo-burnrate
      annotations:
        summary: 'Storefront: <95% request dưới 1s trong 1h (SLO p95<1s breach)'
